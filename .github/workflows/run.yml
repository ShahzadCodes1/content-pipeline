name: Content Pipeline

on:
  schedule:
    - cron: '0 6 * * *'    # 9:00 AM Bahrain (UTC+3)
    - cron: '0 9 * * *'    # 12:00 PM Bahrain
    - cron: '0 12 * * *'   # 3:00 PM Bahrain
    - cron: '0 15 * * *'   # 6:00 PM Bahrain
    - cron: '0 18 * * *'   # 9:00 PM Bahrain
  workflow_dispatch:        # run manually anytime from Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies (for moviepy + video)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python dependencies
        run: |
          pip install google-api-python-client google-auth-oauthlib \
                      requests schedule moviepy pillow numpy

      - name: Create output folders
        run: |
          mkdir -p generated_shots
          mkdir -p generated_videos

      - name: Run pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_TOKEN:   ${{ secrets.YOUTUBE_TOKEN }}
        run: python pipeline.py --once
