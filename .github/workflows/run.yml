name: Content Pipeline

on:
  schedule:
    - cron: '15 4 * * *'   # 7:15 AM Bahrain (UTC+3)
    - cron: '30 9 * * *'   # 12:30 PM Bahrain
    - cron: '30 13 * * *'  # 4:30 PM Bahrain
    - cron: '30 17 * * *'  # 8:30 PM Bahrain
    - cron: '0 22 * * *'   # 1:00 AM Bahrain
  workflow_dispatch:        # run manually anytime from Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python dependencies
        run: |
          pip install google-api-python-client google-auth-oauthlib \
                      requests schedule moviepy pillow numpy huggingface_hub

      - name: Create output folders
        run: |
          mkdir -p generated_shots
          mkdir -p generated_videos

      - name: Run pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_TOKEN:   ${{ secrets.YOUTUBE_TOKEN }}
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
        run: python pipeline.py --once
